{% extends "base.html" %}

{% block title %}Password Changed — {{ APP_NAME }}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5 text-center">
    <div class="card shadow-sm">
      <div class="card-body py-5">
        <i class="bi bi-check-circle display-3 text-success"></i>
        <h3 class="mt-3">Password Changed</h3>
        <p class="text-body-secondary">Your password has been updated successfully.</p>
        <a href="{% url 'core:profile' %}" class="btn btn-primary">
          <i class="bi bi-arrow-left me-1"></i>Back to Profile
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
