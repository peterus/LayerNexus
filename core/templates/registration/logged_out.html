{% extends "base.html" %}

{% block title %}Logged Out — {{ APP_NAME }}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5 text-center">
    <div class="card shadow-sm">
      <div class="card-body py-5">
        <i class="bi bi-box-arrow-right display-3 text-primary"></i>
        <h3 class="mt-3">Logged Out</h3>
        <p class="text-body-secondary">You have been logged out successfully.</p>
        <a href="{% url 'login' %}" class="btn btn-primary">
          <i class="bi bi-box-arrow-in-right me-1"></i>Log In Again
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
